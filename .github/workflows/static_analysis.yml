name: Static Analysis Pipeline

on:
  push:
    branches: [ main ]
    # 👇 1. 아래에 명시된 파일들이 바뀔 때는 이 CI 파이프라인을 작동시키지 마라!
    paths-ignore:
      - '**.md'                  # 모든 마크다운 파일 (README 등)
      - 'docs/**'                 # 문서 폴더 내부 파일들
    pull_request:
    branches: [ main ]
    # 👇 2. PR을 날릴 때도 문서만 바뀐 거라면 검사를 패스해라!
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # 2. 분석 도구 의존성 설치
      - name: Install Static Analysis Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy cmake build-essential

      # 3. 빌드 디렉터리 생성 및 daemon 폴더 타겟팅 (핵심 변경 라인)
      - name: Configure CMake with Analysis Mode
        run: |
          mkdir build
          cd build
          cmake -DENABLE_STATIC_ANALYSIS=ON ..

      # 4. 컴파일 및 2-Track 정적 분석 동시 수행
      - name: Build and Run 2-Track Analysis
        run: |
          cd build
          make -j$(nproc)
