name: Static Analysis Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  # ── STM32 펌웨어 정적분석 : arm 툴체인 + compile_commands 기반 cppcheck ──
  # (호스트측(데몬) 정적분석은 rpi repo 소관 — STM32 는 펌웨어 전용)
  firmware-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v5

      - name: Install Toolchain & Analysis Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck cmake ninja-build gcc-arm-none-eabi

      - name: Firmware cppcheck (Core/Src, -D__GNUC__, --error-exitcode=1)
        run: bash tools/run_static_analysis.sh
