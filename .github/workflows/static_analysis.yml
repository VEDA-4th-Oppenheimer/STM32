name: Static Analysis Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 서버로 코드 체크아웃
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # 2. 2-Track 정적 분석 및 빌드에 필요한 도구 일괄 설치 [cite: 8]
      - name: Install Static Analysis Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy cmake build-essential

      # 3. 빌드 디렉터리 생성 및 분석 모드 활성화 (가이드라인 준수) [cite: 9, 28]
      - name: Configure CMake with Analysis Mode
        run: |
          mkdir build
          cd build
          cmake -DENABLE_STATIC_ANALYSIS=ON ..

      # 4. 컴파일 및 정적 분석 동시 수행 (Exit Code가 0이 아니면 실패) [cite: 29]
      - name: Build and Run 2-Track Analysis
        run: |
          cd build
          make -j$(nproc)
